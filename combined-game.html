<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Combined Game Levels</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #050814;
      }
      .game-shell {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #gameContainer {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      .level-menu {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 12px 16px 18px;
        display: flex;
        justify-content: center;
        gap: 12px;
        background: linear-gradient(180deg, rgba(5, 8, 20, 0) 0%, rgba(5, 8, 20, 0.75) 35%, rgba(5, 8, 20, 0.95) 100%);
        pointer-events: none;
        z-index: 20;
      }
      .level-menu .menu-inner {
        display: flex;
        gap: 10px;
        padding: 8px;
        background: rgba(8, 12, 28, 0.8);
        border: 1px solid rgba(115, 146, 255, 0.2);
        border-radius: 999px;
        backdrop-filter: blur(8px);
        pointer-events: auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      }
      .level-button {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0.3px;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid transparent;
        background: rgba(20, 30, 70, 0.6);
        color: #d9e3ff;
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      }
      .level-button:hover {
        transform: translateY(-1px);
        background: rgba(44, 62, 130, 0.85);
        border-color: rgba(144, 174, 255, 0.6);
      }
      .level-button.active {
        background: linear-gradient(135deg, #5f7bff, #9bb4ff);
        color: #0a0f24;
        border-color: rgba(200, 214, 255, 0.9);
        box-shadow: 0 0 16px rgba(123, 150, 255, 0.55);
      }
      @media (max-width: 640px) {
        .level-menu {
          padding: 10px 12px 14px;
        }
        .level-menu .menu-inner {
          flex-wrap: wrap;
          justify-content: center;
        }
        .level-button {
          font-size: 12px;
          padding: 7px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-shell">
      <div id="gameContainer"></div>
    </div>
    <div class="level-menu" aria-label="Game level menu">
      <div class="menu-inner" id="levelMenu"></div>
    </div>

    <script type="module">
      const inferredBase = window.location.pathname.startsWith('/Team-Portfolio/') ? '/Team-Portfolio' : '';
      const path = '{{ site.baseurl }}' || inferredBase;
      const baseUrl = window.location.origin + path;

      async function boot() {
        const [
          { default: Game },
          { default: GameLevelAquaticGameLevel },
          { default: GameLevelSeek },
          { default: GameLevelBasketball }
        ] = await Promise.all([
          import(`${baseUrl}/assets/js/GameEnginev1/essentials/Game.js?v={{ site.time | date: '%s' }}`),
          import(`${baseUrl}/assets/js/GameLevelAquaticGameLevel.js?v={{ site.time | date: '%s' }}`),
          import(`${baseUrl}/assets/js/GameEnginev1/GameLevelSeek.js?v={{ site.time | date: '%s' }}`),
          import(`${baseUrl}/assets/js/GameEnginev1/GameLevelBasketball.js?v={{ site.time | date: '%s' }}`)
        ]);

        const container = document.getElementById('gameContainer');
        const menuEl = document.querySelector('.level-menu');
        const menuHeight = menuEl ? menuEl.offsetHeight : 0;
        const width = container.clientWidth || 800;
        const height = Math.max((container.clientHeight || 500) - menuHeight, 200);

        const environment = {
          path,
          gameContainer: container,
          gameCanvas: null,
          gameLevelClasses: [
            GameLevelAquaticGameLevel,
            GameLevelSeek,
            GameLevelBasketball
          ],
          innerWidth: width,
          innerHeight: height,
          disablePauseMenu: true,
          pythonURI: baseUrl,
          javaURI: baseUrl,
          fetchOptions: { method: 'GET' }
        };

        const gameInstance = Game.main ? Game.main(environment) : Game(environment);
        window.__combinedGame = gameInstance;

        const menu = document.getElementById('levelMenu');
        if (menu && Array.isArray(environment.gameLevelClasses)) {
          const buttons = new Map();
          const labelMap = new Map([
            [0, 'Aquatic'],
            [1, 'Seek'],
            [2, 'Basketball']
          ]);

          environment.gameLevelClasses.forEach((levelClass, index) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'level-button';
            button.textContent = labelMap.get(index) || levelClass?.name || `Level ${index + 1}`;
            button.addEventListener('click', () => {
              gameInstance?.gameControl?.switchToLevel(index);
            });
            buttons.set(index, button);
            menu.appendChild(button);
          });

          const setActive = (index) => {
            buttons.forEach((button, key) => {
              button.classList.toggle('active', key === index);
            });
          };

          setActive(gameInstance?.gameControl?.currentLevelIndex ?? 0);
          document.addEventListener('game:levelchange', event => {
            setActive(event.detail?.index ?? 0);
          });
        }
      }

      boot().catch(err => console.error('Combined game failed to start:', err));
    </script>
  </body>
</html>
