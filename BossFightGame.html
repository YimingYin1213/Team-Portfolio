<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hollow Knight — Boss Fight</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #07001a;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    #gameContainer {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }
    /* Loading screen */
    #loading-screen {
      position: absolute; inset: 0;
      background: #07001a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #cc66ff;
    }
    #loading-screen h1 {
      font-size: 2.6rem;
      text-shadow: 0 0 30px #9b30ff, 0 0 60px #6600cc;
      letter-spacing: 4px;
      margin-bottom: 18px;
    }
    #loading-screen p {
      color: #8844aa;
      font-size: 1rem;
      letter-spacing: 2px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }
    .load-bar-wrap {
      width: 280px; height: 6px;
      background: #2d0060;
      border: 1px solid #9b30ff;
      border-radius: 3px;
      margin-top: 22px;
      overflow: hidden;
    }
    .load-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #9b30ff, #ff00ff);
      border-radius: 3px;
      animation: loadAnim 1.2s ease-in-out forwards;
    }
    @keyframes loadAnim {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="loading-screen">
      <h1>☽ Palace of Shadows ☾</h1>
      <p>ENTERING THE HOLLOW REALM…</p>
      <div class="load-bar-wrap"><div class="load-bar"></div></div>
    </div>
  </div>

  <script type="module">
    const configuredBase = '{{ site.baseurl }}';
    const path    = configuredBase || '';
    const baseUrl = window.location.origin + path;

    async function boot() {
      const [{ default: Game }, { default: GameLevelHollowKnight }] = await Promise.all([
        import(`${baseUrl}/assets/js/GameEnginev1/essentials/Game.js`),
        import(`${baseUrl}/assets/js/GameLevelHollowKnight.js`)
      ]);

      // Hide loading screen once modules are ready
      const ls = document.getElementById('loading-screen');
      if (ls) ls.style.display = 'none';

      const container = document.getElementById('gameContainer');
      const W = container.clientWidth  || window.innerWidth;
      const H = container.clientHeight || window.innerHeight;

      const environment = {
        path,
        gameContainer: container,
        gameCanvas: null,
        gameLevelClasses: [GameLevelHollowKnight],
        innerWidth:  W,
        innerHeight: H,
        disablePauseMenu: true,
        pythonURI: baseUrl,
        javaURI:   baseUrl,
        fetchOptions: { method: 'GET' }
      };

      window.__bossGame = Game.main ? Game.main(environment) : Game(environment);
    }

    boot().catch(err => {
      console.error('Boss fight failed to start:', err);
      const ls = document.getElementById('loading-screen');
      if (ls) ls.innerHTML = `<h1 style="color:#ff4444">Failed to load</h1><p>${err.message}</p>`;
    });
  </script>
</body>
</html>
